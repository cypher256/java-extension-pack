name: Publish to Open VSX
on:
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx ovsx publish -p ${{ secrets.OVSX_PAT }}
